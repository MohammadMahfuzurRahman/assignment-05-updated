<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="./assets/github-logo.png">
            </div>
            <h1 class="login-title">GitHub Issues Tacker</h1>
            <p class="login-subtitle">Sign in to manage your issues</p>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" value="">
                    <small class="help-text">Default: admin</small>
                </div >
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" value="">
                    <small class="help-text">Default: admin123</small>
                </div>
                <button type="submit" class="btn-signin">Sign IN</button>
            </form>
            <div class="demo-section">
                <p class="demo-text">OR</p>
                <p class="demo-label">Demo Credentials</p>
                <p class="demo-credentials">Username:<strong>admin</strong></p>
                <p class="demo-credentials">Password:<strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <div id="mainPage" class="main-page hidden">
        <nav class="navbar">
        <div class="navbar-left">
            <div class="navbar-logo">
               <img src="./assets/github-logo.png">
            <span>Github Issues Tracker</span>
            </div>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search issues..." class="search-input">
                <button id="searchBtn" class="search-btn">🔍</button>
            </div>
            <button id="newIssueBtn" class="btn-new-issue">+ New Issue</button>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
     </nav>
     <div class="issues-container">
        <div class="tabs-section">
            <button class="tab-btn active" data-filter="all">All</button>
            <button class="tab-btn" data-filter="open">Open</button>
            <button class="tab-btn" data-filter="closed">Closed</button>
        </div>
        <div class="issues-header">
            <div class="header-left">
                 <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span id="issueCount" class="issue-count">0 Issues</span>
            </div>
            <div class="header-right">
                <span class="status-badge open-badge">● Open</span>
                <span class="status-badge closed-badge">● Closed</span>
            </div>
        </div>
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>
        <div id="issuesGrid" class="issues-grid">

        </div>
     </div>
    </div>
    <div id="issueModal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalBody" class="modal-body">
                
            </div>
        </div>

    </div>
    <script src="./script.js"></script>
</body>
</html>
